<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">祥云阁</a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="bazi.html">八字排盘</a></li>
          <li><a href="shengxiao.html">生肖运势</a></li>
          <li><a href="chouqian.html">抽签求卦</a></li>
          <li><a href="huangli.html">黄历查询</a></li>
          <li><a href="xingming.html" class="active">姓名测试</a></li>
        </ul>
        <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
      </nav>
    </div>
  </header>
  <div class="ad-banner"></div>
  <section class="page-header">
    <div class="container">
      <h1><i class="fas fa-user-edit"></i> 姓名测试</h1>
      <p class="desc">输入您的姓名，分析五行、卦象、吉凶</p>
    </div>
  </section>
  <main class="page-content">
    <div class="container">
      <section class="input-section">
        <div class="card">
          <h3 class="card-title"><i class="fas fa-pen"></i> 请输入您的姓名</h3>
          <form id="xingmingForm">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">姓氏</label>
                <input type="text" class="form-input" id="surname" placeholder="姓" maxlength="1" required>
              </div>
              <div class="form-group">
                <label class="form-label">名字（单字）</label>
                <input type="text" class="form-input" id="givenName" placeholder="名" maxlength="2" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">性别</label>
              <select class="form-input form-select" id="gender" required>
                <option value="">请选择</option>
                <option value="male">男</option>
                <option value="female">女</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="fas fa-search"></i> 开始分析
            </button>
          </form>
        </div>
      </section>
      <section class="result-section" id="resultSection" style="display: none;">
        <div class="result-card">
          <div class="result-header">
            <span class="result-title"><i class="fas fa-chart-pie"></i> 分析结果</span>
            <span class="result-badge" id="scoreBadge">-分</span>
          </div>
          <div class="result-content">
            <div class="result-item">
              <div class="result-label">姓名</div>
              <div class="result-value" id="fullName">-</div>
            </div>
            <div class="result-item">
              <div class="result-label">五格数理</div>
              <div class="result-value" id="wuge">-</div>
            </div>
            <div class="result-item">
              <div class="result-label">五行配置</div>
              <div class="result-value" id="wuxingConfig">-</div>
            </div>
            <div class="result-item">
              <div class="result-label">命理分析</div>
              <div class="result-value" id="mingli">-</div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <section class="bottom-nav"><div class="container"><div class="nav-grid">

</body>
</html>
