  <div class="ad-banner"></div>
  <section class="page-header"><div class="container"><h1><i class="fas fa-moon"></i> 解梦查询</h1><p class="desc">输入梦境关键词，解读梦中寓意</p></div></section>
  <main class="page-content">
    <div class="container">
      <section class="input-section">
        <div class="card">
          <h3 class="card-title"><i class="fas fa-search"></i> 请输入梦境关键词</h3>
          <form id="jiemengForm">
            <div class="search-box">
              <input type="text" class="form-input" id="dreamKeyword" placeholder="例如：蛇、龙、去世的人..." required>
              <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> 解梦</button>
            </div>
            <div class="hot-words mt-md">
              <p class="text-center text-muted" style="color: var(--color-text-muted); font-size: 0.875rem;">热门关键词：<a href="#" onclick="document.getElementById('dreamKeyword').value='蛇'; document.getElementById('jiemengForm').dispatchEvent(new Event('submit'));">蛇</a> <a href="#" onclick="document.getElementById('dreamKeyword').value='水'; document.getElementById('jiemengForm').dispatchEvent(new Event('submit'));">水</a> <a href="#" onclick="document.getElementById('dreamKeyword').value='死人'; document.getElementById('jiemengForm').dispatchEvent(new Event('submit'));">死人</a> <a href="#" onclick="document.getElementById('dreamKeyword').value='飞翔'; document.getElementById('jiemengForm').dispatchEvent(new Event('submit'));">飞翔</a> <a href="#" onclick="document.getElementById('dreamKeyword').value='棺材'; document.getElementById('jiemengForm').dispatchEvent(new Event('submit'));">棺材</a> <a href="#" onclick="document.getElementById('dreamKeyword').value='洪水'; document.getElementById('jiemengForm').dispatchEvent(new Event('submit'));">洪水</a></p>
            </div>
          </form>
        </div>
      </section>
      <section class="result-section" id="resultSection" style="display: none;">
        <div class="result-card">
          <div class="result-header"><span class="result-title"><i class="fas fa-book"></i> 解梦结果</span><span class="result-badge" id="luckLevel">-</span></div>
          <div class="result-content">
            <div class="result-item"><div class="result-label">梦境关键词</div><div class="result-value" id="dreamWord">-</div></div>
            <div class="result-item"><div class="result-label">凶吉判断</div><div class="result-value" id="jiXiong">-</div></div>
            <div class="result-item"><div class="result-label">传统解释</div><div class="result-value" id="traditionalMeaning">-</div></div>
            <div class="result-item"><div class="result-label">心理学解读</div><div class="result-value" id="psychologyMeaning">-</div></div>
          </div>
        </div>
      </section>
    </div>
