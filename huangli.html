<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="祥云阁黄历查询 - 今日宜忌、吉时冲煞、神煞方位，传统黄历信息一览无遗。">
  <title>黄历查询 - 祥云阁专业命理</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">祥云阁</a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="bazi.html">八字排盘</a></li>
          <li><a href="shengxiao.html">生肖运势</a></li>
          <li><a href="chouqian.html">抽签求卦</a></li>
          <li><a href="huangli.html" class="active">黄历查询</a></li>
          <li><a href="xingming.html">姓名测试</a></li>
        </ul>
        <button class="mobile-menu-btn" aria-label="菜单">
          <i class="fas fa-bars"></i>
        </button>
      </nav>
    </div>
  </header>

  <!-- 横幅广告位 -->
  <div class="ad-banner"></div>

  <!-- 页面标题 -->
  <section class="page-header">
    <div class="container">
      <h1><i class="fas fa-calendar-alt"></i> 黄历查询</h1>
      <p class="desc">查看今日宜忌、吉时冲煞，择吉行事</p>
    </div>
  </section>

  <!-- 主内容 -->
  <main class="page-content">
    <div class="container">
      <!-- 日期选择 -->
      <section class="date-section">
        <div class="card">
          <h3 class="card-title"><i class="fas fa-calendar-plus"></i> 选择日期</h3>
          <div class="date-display">
            <input type="date" class="form-input" id="datePicker" value="">
            <button class="btn btn-primary" id="todayBtn">
              <i class="fas fa-bolt"></i> 今日
            </button>
          </div>
        </div>
      </section>

      <!-- 黄历结果 -->
      <section class="huangli-section" id="resultSection">
        <!-- 日期信息 -->
        <div class="result-card">
          <div class="result-header">
            <span class="result-title"><i class="fas fa-sun"></i> <span id="dateDisplay">-</span></span>
            <span class="result-badge" id="nongliDate">-</span>
          </div>
          <div class="date-info-grid">
            <div class="date-info-item">
              <i class="fas fa-calendar-day"></i>
              <div>
                <small>宜</small>
                <div class="yi-list" id="yiList">-</div>
              </div>
            </div>
            <div class="date-info-item">
              <i class="fas fa-calendar-minus"></i>
              <div>
                <small>忌</small>
                <div class="ji-list" id="jiList">-</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 吉时冲煞 -->
        <div class="result-card">
          <div class="result-header">
            <span class="result-title"><i class="fas fa-clock"></i> 吉时冲煞</span>
          </div>
          <div class="jishi-container">
            <div class="jishi-section">
              <h4><i class="fas fa-star"></i> 吉时</h4>
              <div class="jishi-list" id="jishiList">-</div>
            </div>
            <div class="chongsha-section">
              <h4><i class="fas fa-exclamation-triangle"></i> 冲煞</h4>
              <div class="chongsha-info" id="chongshaInfo">-</div>
            </div>
          </div>
        </div>

        <!-- 神煞方位 -->
        <div class="result-card">
          <div class="result-header">
            <span class="result-title"><i class="fas fa-compass"></i> 神煞方位</span>
          </div>
          <div class="shensha-grid">
            <div class="shensha-item">
              <div class="shensha-label">喜神方位</div>
              <div class="shensha-value" id="xishen">-</div>
            </div>
            <div class="shensha-item">
              <div class="shensha-label">福神方位</div>
              <div class="shensha-value" id="fushen">-</div>
            </div>
            <div class="shensha-item">
              <div class="shensha-label">财神方位</div>
              <div class="shensha-value" id="caishen">-</div>
            </div>
            <div class="shensha-item">
              <div class="shensha-label">阳贵方位</div>
              <div class="shensha-value" id="yanggui">-</div>
            </div>
            <div class="shensha-item">
              <div class="shensha-label">阴贵方位</div>
              <div class="shensha-value" id="yingui">-</div>
            </div>
            <div class="shensha-item">
              <div class="shensha-label">五鬼方位</div>
              <div class="shensha-value" id="wugui">-</div>
            </div>
          </div>
        </div>

        <!--彭祖百忌-->
        <div class="result-card">
          <div class="result-header">
            <span class="result-title"><i class="fas fa-scroll"></i> 彭祖百忌</span>
          </div>
          <div class="pengzu-content" id="pengzuContent">
            <p class="pengzu-text">-</p>
          </div>
        </div>

        <!-- 吉日推荐 -->
        <div class="result-card">
          <div class="result-header">
            <span class="result-title"><i class="fas fa-thumbs-up"></i> 今日吉事</span>
          </div>
          <div class="jiri-grid" id="jiriGrid">
            <!-- 动态生成 -->
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- 底部导航 -->
  <section class="bottom-nav">
    <div class="container">
      <div class="nav-grid">
        <a href="jiemeng.html">解梦查询</a>
        <a href="xingzuo.html">星座查询</a>
        <a href="fengshui.html">风水罗盘</a>
        <a href="shouxiang.html">手相面相</a>
        <a href="mingpan.html">命盘解读</a>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>免责声明：本网站内容仅供娱乐参考，请勿迷信</p>
      <p>&copy; 2026 祥云阁 All Rights Reserved</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/huangli.js"></script>
</body>
</html>
